name: 自动更新笔记索引

on:
  push:
    paths:
      - "notes/**.md"
      - "build.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成 manifest.json
        run: python3 build.py

      - name: 提交索引（若有变化）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/manifest.json
          git diff --cached --quiet || git commit -m "chore: 自动更新笔记索引"
          git push
